<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ordinator</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <h1>Ordinator</h1>
          <button id="createWorkspaceButton" class="ghost-button" type="button">+ New</button>
        </div>
        <ul id="workspaceList" class="workspace-list"></ul>
        <div class="rail-footer">
          <div class="rail-controls">
            <button
              id="syncNowButton"
              class="rail-icon-button"
              type="button"
              title="Sync now"
              aria-label="Sync now"
            >
              &#10227;
            </button>
            <button
              id="settingsRailButton"
              class="rail-icon-button"
              type="button"
              title="Global settings"
              aria-label="Global settings"
            >
              &#9881;
            </button>
          </div>
          <div id="parkedWorkspaceList" class="parked-workspace-list"></div>
        </div>
      </aside>

      <main class="main">
        <section class="dashboard-search-bar" aria-label="Workspace search">
          <label class="dashboard-search-label" for="dashboardSearchInput">Search</label>
          <div class="dashboard-search-shell">
            <form id="dashboardSearchForm" class="dashboard-search-form" role="search" autocomplete="off">
              <input
                id="dashboardSearchInput"
                type="search"
                autocomplete="off"
                spellcheck="false"
                placeholder="Search workspaces, open tabs, sleeping tabs, and history"
                aria-autocomplete="list"
                aria-controls="dashboardSearchDropdown"
                aria-expanded="false"
              />
            </form>
            <div id="dashboardSearchDropdown" class="dashboard-search-dropdown" hidden></div>
          </div>
        </section>

        <header class="main-header">
          <div class="workspace-header-copy">
            <h2>
              <button id="workspaceNameButton" class="workspace-title-button" type="button" title="Rename workspace">
                <span id="workspaceName" class="workspace-rename-label">Workspace</span>
                <span class="workspace-rename-icon" aria-hidden="true">✎</span>
              </button>
            </h2>
            <p id="workspaceMeta" class="meta-text"></p>
          </div>
          <div class="header-actions">
            <button id="sleepButton" type="button">Sleep Open Tabs</button>
            <button id="deleteSelectedButton" class="danger-soft" type="button" disabled>Delete Selected Tabs</button>
            <button id="wakeButton" type="button">Wake Sleeping Tabs</button>
          </div>
        </header>

        <nav class="tabs-nav">
          <button class="tab-button active" data-view="tabs" type="button">Tabs</button>
          <button class="tab-button" data-view="history" type="button">History</button>
          <button class="tab-button" data-view="resources" type="button">Resources</button>
        </nav>

        <section id="content" class="content"></section>
      </main>
    </div>

    <template id="itemTemplate">
      <article class="list-item">
        <div class="item-copy">
          <p class="item-title"></p>
          <p class="item-subtitle"></p>
        </div>
        <div class="item-actions"></div>
      </article>
    </template>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
